services:
  pdf-service:
    build: .
    container_name: pdf-svc
    ports:
      - "8080:8080"
    environment:
      - LLM_API_BASE=${LLM_API_BASE:-http://ollama:11434/v1}
      - LLM_MODEL=${LLM_MODEL:-qwen2.5:0.5b}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_TIMEOUT=600
      - LLM_CONNECT_TIMEOUT=${LLM_CONNECT_TIMEOUT:-12}
      - LLM_MAX_TOKENS=4000
      - LLM_JSON_MODE=${LLM_JSON_MODE:-1}
      - MAX_FILE_SIZE_MB=15
      - MAX_TEXT_CHARS=22000
      - LLM_CHUNK_SIZE=9000
      - LLM_CHUNK_OVERLAP=350
      - LLM_MAX_CHUNKS=8
      - LLM_HEAD_TAIL_FACTOR=2.25
      - LOG_DIR=/app/logs
      - LOG_TO_FILE=${LOG_TO_FILE:-1}
      - LOG_FILE_NAME=${LOG_FILE_NAME:-pdf-service.log}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    container_name: pdf-ollama
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 20s
      timeout: 8s
      retries: 10

  ollama-pull:
    image: ollama/ollama:latest
    container_name: pdf-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ollama_data:/root/.ollama
    restart: "no"
    entrypoint: ["ollama", "pull"]
    command: ["${LLM_MODEL:-qwen2.5:0.5b}"]

volumes:
  ollama_data:
